spring.application.name=auth-service

server.port=8081

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# MySQL - database will be created automatically
spring.datasource.url=jdbc:mysql://localhost:3306/fraud_auth_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=21045205@Zed
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# JWT
security.jwt.secret=THIS_IS_A_DEMO_SECRET_KEY_CHANGE_IT_LATER_123456789
security.jwt.expiration-ms=86400000

# Actuator
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always